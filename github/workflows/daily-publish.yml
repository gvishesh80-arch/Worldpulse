name: Daily Blog Publisher

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate todays blog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scripts
          python publish.py

      - name: Commit and push new blog
        run: |
          git config --global user.name "WorldPulse Bot"
          git config --global user.email "bot@worldpulse.blog"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Daily blog $(date +'%B %d %Y')"
            git push
          fi
