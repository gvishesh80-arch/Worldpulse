name: Daily Blog Publisher

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate blog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/publish.py

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "WorldPulse Bot"
          git config --global user.email "bot@worldpulse.blog"
          git add index.html
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Daily blog $(date +'%B %d %Y')"
          git push origin main
