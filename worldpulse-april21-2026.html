<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WorldPulse — Global Intelligence Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#0f0e0d;--paper:#f6f2ea;--cream:#faf7f2;
  --red:#c41e3a;--gold:#b8860b;--teal:#1a5f7a;
  --rule:#ddd6c8;--mist:#8a8680;--surf:#fff;
  --blue:#1a3a5c;--green:#1a4a2e;--orange:#b84a00;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--paper);color:var(--ink);font-family:'Source Serif 4',Georgia,serif;font-size:17px;line-height:1.7;}

/* ── TICKER ── */
.ticker{background:var(--red);color:#fff;height:34px;display:flex;overflow:hidden;position:sticky;top:0;z-index:200;}
.ticker-tag{background:#000;color:#fff;padding:0 14px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;display:flex;align-items:center;flex-shrink:0;text-transform:uppercase;}
.ticker-track{overflow:hidden;flex:1;display:flex;align-items:center;}
.ticker-inner{display:flex;white-space:nowrap;animation:tick 45s linear infinite;}
.ticker-inner span{font-size:11px;font-weight:500;padding:0 36px;}
.ticker-inner span::after{content:'◆';margin-left:36px;opacity:.4;}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── MASTHEAD ── */
.masthead{background:var(--ink);padding:0 32px;border-bottom:3px solid var(--red);}
.mast-top{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.mast-date{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.45);letter-spacing:1px;text-transform:uppercase;}
.mast-logo{text-align:center;flex:1;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(2rem,5vw,3.8rem);color:#fff;letter-spacing:-1px;line-height:1;text-transform:uppercase;cursor:pointer;}
.logo-name span{color:var(--red);}
.logo-tag{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.35);letter-spacing:4px;text-transform:uppercase;margin-top:3px;}
.mast-actions{display:flex;gap:10px;align-items:center;}
.btn-sub{background:var(--red);color:#fff;border:none;padding:7px 16px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.btn-sub:hover{background:#a01830;}
.btn-search{background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff;padding:7px 12px;cursor:pointer;font-size:13px;transition:border-color .2s;}
.btn-search:hover{border-color:rgba(255,255,255,.6);}

/* ── NAV ── */
.nav{display:flex;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-item{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5);padding:12px 18px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;user-select:none;}
.nav-item:hover{color:#fff;}
.nav-item.active{color:#fff;border-bottom-color:var(--red);}

/* ── LAYOUT ── */
.container{max-width:1220px;margin:0 auto;padding:0 32px;}

/* ── SEARCH BAR ── */
.search-wrap{display:none;background:var(--ink);padding:14px 32px;border-bottom:1px solid rgba(255,255,255,.1);}
.search-wrap.open{display:flex;gap:10px;align-items:center;}
.search-wrap input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:9px 14px;font-family:'Source Serif 4',serif;font-size:14px;outline:none;border-radius:2px;}
.search-wrap input::placeholder{color:rgba(255,255,255,.3);}
.search-wrap button{background:var(--red);color:#fff;border:none;padding:9px 18px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;}

/* ── MARKETS STRIP ── */
.markets{display:flex;gap:0;background:var(--cream);border-bottom:2px solid var(--rule);overflow-x:auto;padding:0 32px;}
.market-item{display:flex;align-items:center;gap:8px;padding:9px 20px 9px 0;border-right:1px solid var(--rule);white-space:nowrap;}
.market-item:last-child{border-right:none;}
.m-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--mist);text-transform:uppercase;}
.m-val{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--ink);}
.m-chg{font-family:'Space Mono',monospace;font-size:10px;}
.up{color:#2a9e60;}.down{color:var(--red);}

/* ── SECTION HEADER ── */
.sec-hd{display:flex;align-items:center;gap:14px;margin:40px 0 22px;}
.sec-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;text-transform:uppercase;letter-spacing:-.3px;color:var(--ink);}
.sec-rule{flex:1;height:2px;background:var(--rule);}
.sec-rule.red{background:var(--red);}
.sec-more{font-family:'Space Mono',monospace;font-size:10px;color:var(--red);cursor:pointer;white-space:nowrap;text-decoration:none;}
.sec-more:hover{text-decoration:underline;}

/* ── HERO GRID ── */
.hero-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:2px;background:var(--rule);border:2px solid var(--rule);margin-top:32px;}
.hero-lead{background:var(--surf);padding:28px 32px;position:relative;}
.hero-lead::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--red);}
.hero-img{width:100%;height:300px;background:linear-gradient(160deg,#0f1e30,#1a3a58,#0d2035);display:flex;align-items:flex-end;padding:20px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero-img-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:90px;opacity:.1;}
.hero-img-cap{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.55);letter-spacing:.5px;position:relative;z-index:1;}
.hero-badge{background:var(--red);color:#fff;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:3px 9px;text-transform:uppercase;position:absolute;top:18px;left:20px;}
.kicker{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--red);border-top:2px solid var(--red);padding-top:5px;display:inline-block;margin-bottom:10px;}
.kicker.teal{color:var(--teal);border-top-color:var(--teal);}
.kicker.gold{color:var(--gold);border-top-color:var(--gold);}
.kicker.green{color:#2a7a3a;border-top-color:#2a7a3a;}
h1.hero-hl{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1.7rem,2.8vw,2.4rem);line-height:1.15;color:var(--ink);margin-bottom:14px;cursor:pointer;}
h1.hero-hl:hover{color:var(--red);}
.deck{font-size:15px;color:#444;line-height:1.7;font-weight:300;margin-bottom:16px;}
.byline{font-family:'Space Mono',monospace;font-size:9px;color:var(--mist);letter-spacing:.8px;text-transform:uppercase;padding-top:14px;border-top:1px solid var(--rule);}
.byline strong{color:var(--ink);}
.read-more{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--red);cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-top:10px;text-decoration:none;border-bottom:1px solid transparent;transition:border-color .2s;}
.read-more:hover{border-bottom-color:var(--red);}
.read-more.teal{color:var(--teal);}
.read-more.teal:hover{border-bottom-color:var(--teal);}

/* Hero side stories */
.hero-side{background:var(--surf);padding:22px 26px;}
.hero-side+.hero-side{border-top:2px solid var(--rule);}
.side-img{width:100%;height:120px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden;}
.hl2{font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;line-height:1.3;color:var(--ink);cursor:pointer;margin-bottom:7px;}
.hl2:hover{color:var(--red);}
.deck2{font-size:13px;color:#555;line-height:1.6;font-weight:300;}

/* ── CARD GRID ── */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--rule);border:2px solid var(--rule);}
.card{background:var(--surf);padding:22px;cursor:pointer;transition:background .15s;}
.card:hover{background:#fffef9;}
.card-img{width:100%;height:148px;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:14px;position:relative;overflow:hidden;}
.hl3{font-family:'Playfair Display',serif;font-weight:700;font-size:1rem;line-height:1.3;color:var(--ink);margin-bottom:7px;}
.hl3:hover{color:var(--red);}
.deck3{font-size:12px;color:#555;line-height:1.6;font-weight:300;}

/* ── DARK FEATURE ── */
.dark-feature{background:var(--ink);padding:40px 44px;display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:center;cursor:pointer;transition:opacity .2s;position:relative;overflow:hidden;margin:2px 0;}
.dark-feature::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(196,30,58,.08),transparent 60%);}
.dark-feature:hover{opacity:.95;}
.df-kicker{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(232,160,160,.8);border-top:2px solid var(--red);padding-top:5px;display:inline-block;margin-bottom:12px;}
.df-hl{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1.4rem,2.3vw,2rem);line-height:1.2;color:#fff;margin-bottom:14px;}
.df-deck{font-size:14px;color:rgba(255,255,255,.6);line-height:1.7;font-weight:300;}
.df-read{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;color:rgba(232,160,160,.8);display:inline-flex;align-items:center;gap:5px;margin-top:14px;text-decoration:none;}
.df-visual{font-size:110px;opacity:.14;text-align:center;}

/* ── OPINION STRIP ── */
.opinion-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--rule);border:2px solid var(--rule);}
.op-card{background:#fff;padding:22px;border-top:4px solid;cursor:pointer;transition:background .15s;}
.op-card:hover{background:var(--cream);}
.op-card:nth-child(1){border-top-color:var(--red);}
.op-card:nth-child(2){border-top-color:var(--blue);}
.op-card:nth-child(3){border-top-color:var(--green);}
.op-card:nth-child(4){border-top-color:var(--gold);}
.op-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mist);margin-bottom:9px;}
.op-avatar{width:38px;height:38px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Playfair Display',serif;font-weight:700;font-size:15px;margin-bottom:10px;}
.op-author{font-family:'Space Mono',monospace;font-size:9px;color:var(--mist);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;}
.op-hl{font-family:'Playfair Display',serif;font-style:italic;font-size:.92rem;line-height:1.4;color:var(--ink);}

/* ── LIVE SECTION ── */
.live-section{background:var(--ink);padding:36px 40px;margin:40px 0;}
.live-badge{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;padding:5px 12px;text-transform:uppercase;margin-bottom:20px;}
.live-dot{width:7px;height:7px;background:#fff;border-radius:50%;animation:blink 1.4s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:24px;}
.update-item{display:grid;grid-template-columns:90px 1fr;gap:18px;padding:15px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.u-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--red);letter-spacing:.5px;}
.u-text{font-size:13px;color:rgba(255,255,255,.78);line-height:1.6;}
.u-text strong{color:#fff;}
.utag{display:inline-block;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;padding:2px 7px;margin-right:7px;text-transform:uppercase;border:1px solid;}
.utag.war{border-color:#ff7070;color:#ff7070;}
.utag.econ{border-color:#60c878;color:#60c878;}
.utag.sci{border-color:#60aaf0;color:#60aaf0;}
.utag.diplo{border-color:#f0c040;color:#f0c040;}
.utag.ai{border-color:#a090f0;color:#a090f0;}

/* ── BOTTOM GRID ── */
.bottom-grid{display:grid;grid-template-columns:2fr 340px;gap:2px;background:var(--rule);border:2px solid var(--rule);margin-bottom:40px;}
.most-read{background:var(--surf);padding:26px;}
.mr-item{display:grid;grid-template-columns:32px 1fr;gap:14px;padding:14px 0;border-bottom:1px solid var(--rule);align-items:start;cursor:pointer;}
.mr-item:last-child{border-bottom:none;}
.mr-item:hover .mr-title{color:var(--red);}
.mr-num{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--rule);line-height:1;margin-top:-3px;}
.mr-title{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:3px;}
.mr-meta{font-size:11px;color:var(--mist);}

/* Sidebar */
.sidebar{background:var(--surf);}
.sb-widget{padding:22px;border-bottom:2px solid var(--rule);}
.sb-widget:last-child{border-bottom:none;}
.sb-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mist);margin-bottom:14px;padding-bottom:7px;border-bottom:2px solid var(--rule);}
.sb-link{display:block;padding:13px 0;border-bottom:1px solid var(--rule);cursor:pointer;text-decoration:none;}
.sb-link:last-child{border-bottom:none;}
.sb-link:hover .sb-hl{color:var(--red);}
.sb-tag{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--red);margin-bottom:3px;}
.sb-hl{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--ink);line-height:1.3;}
.sb-meta{font-family:'Space Mono',monospace;font-size:8px;color:var(--mist);margin-top:3px;}

/* Newsletter */
.nl-widget{background:var(--cream);padding:20px;}
.nl-widget p{font-size:12px;color:#555;margin-bottom:12px;line-height:1.5;}
.nl-widget input{width:100%;border:1px solid var(--rule);padding:8px 11px;font-family:'Source Serif 4',serif;font-size:13px;background:#fff;margin-bottom:8px;outline:none;transition:border-color .2s;}
.nl-widget input:focus{border-color:var(--ink);}
.nl-widget button{width:100%;background:var(--ink);color:#fff;border:none;padding:9px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.nl-widget button:hover{background:var(--red);}

/* ── FOOTER ── */
footer{background:var(--ink);color:rgba(255,255,255,.4);padding:36px 32px;margin-top:60px;}
.footer-inner{max-width:1220px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px;padding-bottom:28px;border-bottom:1px solid rgba(255,255,255,.08);}
.footer-brand .logo-name{font-size:1.6rem;}
.footer-brand p{margin-top:10px;font-size:12px;line-height:1.7;}
.footer-col h4{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:12px;}
.footer-col a{display:block;font-size:12px;color:rgba(255,255,255,.35);text-decoration:none;margin-bottom:7px;transition:color .2s;cursor:pointer;}
.footer-col a:hover{color:#fff;}
.footer-bottom{max-width:1220px;margin:22px auto 0;display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.5px;}

/* ══════════════════════════════════════
   ARTICLE PAGE
══════════════════════════════════════ */
.article-page{max-width:780px;margin:0 auto;padding:48px 32px 80px;}
.art-breadcrumb{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--mist);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.art-breadcrumb a{color:var(--red);cursor:pointer;text-decoration:none;}
.art-breadcrumb a:hover{text-decoration:underline;}
.art-kicker{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--red);border-top:2px solid var(--red);padding-top:5px;display:inline-block;margin-bottom:14px;}
.art-hl{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1.9rem,4vw,2.9rem);line-height:1.13;color:var(--ink);margin-bottom:18px;letter-spacing:-.3px;}
.art-deck{font-size:1.12rem;font-weight:300;color:#444;line-height:1.65;margin-bottom:22px;border-left:4px solid var(--red);padding-left:18px;font-style:italic;}
.art-byline{display:flex;align-items:center;gap:12px;padding:14px 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:34px;}
.art-avatar{width:38px;height:38px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Playfair Display',serif;font-weight:700;font-size:15px;flex-shrink:0;}
.art-byline-name{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--ink);letter-spacing:.5px;text-transform:uppercase;}
.art-byline-meta{font-family:'Space Mono',monospace;font-size:9px;color:var(--mist);}
.art-hero{width:100%;height:340px;margin-bottom:8px;position:relative;overflow:hidden;border-radius:2px;}
.art-hero-cap{font-family:'Space Mono',monospace;font-size:9px;color:var(--mist);margin-bottom:30px;font-style:italic;}
.art-body p{margin-bottom:22px;font-size:1.02rem;line-height:1.85;color:#1a1a1a;}
.art-body h3{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--ink);margin:38px 0 14px;padding-top:30px;border-top:2px solid var(--rule);}
.art-body blockquote{margin:34px 0;padding:22px 26px;background:var(--cream);border-left:5px solid var(--gold);font-style:italic;font-size:1.1rem;color:#333;line-height:1.7;}
.art-body blockquote cite{display:block;margin-top:10px;font-family:'Space Mono',monospace;font-size:9px;font-style:normal;color:var(--mist);letter-spacing:1px;text-transform:uppercase;}
.pull-quote{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;font-style:italic;color:var(--red);text-align:center;padding:30px 0;border-top:3px solid var(--red);border-bottom:3px solid var(--red);margin:38px 0;line-height:1.3;}
.fact-box{background:var(--blue);color:#fff;padding:26px;margin:34px 0;}
.fact-box-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.fact-box ul{list-style:none;}
.fact-box ul li{font-size:13px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;color:rgba(255,255,255,.82);}
.fact-box ul li:last-child{border-bottom:none;}
.fact-box ul li strong{color:#fff;font-family:'Space Mono',monospace;font-size:12px;}
.art-tags{margin-top:44px;padding-top:22px;border-top:2px solid var(--rule);display:flex;flex-wrap:wrap;gap:7px;}
.tag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--rule);padding:4px 11px;color:var(--mist);cursor:pointer;transition:all .2s;}
.tag:hover{border-color:var(--ink);color:var(--ink);}
.art-nav{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--rule);border:2px solid var(--rule);margin-top:44px;}
.art-nav-item{background:var(--surf);padding:20px;cursor:pointer;transition:background .15s;}
.art-nav-item:hover{background:var(--cream);}
.art-nav-item.next{text-align:right;}
.art-nav-dir{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mist);margin-bottom:6px;}
.art-nav-title{font-family:'Playfair Display',serif;font-weight:700;font-size:.95rem;color:var(--ink);line-height:1.3;}
.art-nav-item:hover .art-nav-title{color:var(--red);}
.back-btn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--red);cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-top:28px;padding-top:28px;border-top:1px solid var(--rule);text-decoration:none;}
.back-btn:hover{text-decoration:underline;}

/* ── CATEGORY PAGE ── */
.cat-page{max-width:1100px;margin:0 auto;padding:40px 32px 80px;}
.cat-header{text-align:center;padding:28px 0 32px;border-bottom:3px double var(--rule);margin-bottom:36px;}
.cat-name{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;color:var(--ink);}
.cat-desc{font-size:14px;color:var(--mist);margin-top:8px;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--rule);border:2px solid var(--rule);}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .container,.article-page,.cat-page{padding:0 16px;}

    body: `<p>The fragile ceasefire binding the United States, Israel, and Iran to a pause in hostilities entered its most perilous hours yet on Tuesday, as Vice President JD Vance boarded a plane for Islamabad even while Iranian officials publicly insisted no second round of peace talks would take place.</p>
<p>The delegation — which also includes special envoy Steve Witkoff and Jared Kushner, the same team that led the first round of Islamabad talks on April 11-12 — departed amid a frenzy of contradictory signals from both capitals that left diplomats and analysts scrambling to determine whether negotiations had collapsed or were simply proceeding through deliberate opacity.</p>

<h3>The Ceasefire That Nearly Wasn't</h3>
<p>The two-week ceasefire agreed in the original Islamabad talks was technically set to expire Tuesday, though Trump announced Monday that he was extending the deadline to Wednesday evening — effectively giving negotiators an additional 24 hours to reach a breakthrough. The White House spent all of Monday waiting for a signal from Tehran that it would send a delegation to Islamabad, with sources describing an atmosphere of intense uncertainty.</p>

<p>Pakistani authorities have begun referring to the engagement as the "Islamabad Process" — a deliberate framing designed to present the talks not as a single high-stakes meeting but as an ongoing diplomatic track with its own institutional momentum. Analysts say this framing matters: it lowers the cost of individual meetings collapsing while preserving the broader channel.</p>

    body:`<p>The scale of destruction wrought on the Gaza Strip over more than two years of war is so vast that restoring the territory to its pre-war baseline would require $71.4 billion — a sum larger than the annual GDP of many middle-income countries — according to a landmark joint assessment published Monday by the United Nations, European Union, and World Bank.</p>
<p>The final Gaza Rapid Damage and Needs Assessment (RDNA), released April 20, found that the conflict that began following the Hamas attacks on October 7, 2023 has caused damage and losses of catastrophic proportions, pushing back human development in the Gaza Strip by an estimated 77 years and displacing nearly 1.9 million people.</p>

    reads:'22,100',
    body:`<p>Anthropic released Claude Opus 4.7 on April 17, and it is, by the company's own account and by independent benchmark testing, the most capable AI model available to the public. It outperforms OpenAI's GPT-5.4, released in early March, and Google's Gemini 3.1 Pro from February across a series of demanding tests: agentic coding, scaled tool use, agentic computer use, financial analysis, and multi-step research workflows.</p>
<p>But the more significant story — the one that will define how historians eventually narrate this period in AI development — is the sentence buried in Anthropic's announcement: Opus 4.7 is not the company's most powerful model. That distinction belongs to Claude Mythos, a system Anthropic has restricted to a small number of enterprise partners for cybersecurity testing, and which the company has explicitly stated it does not plan to release to the public.</p>
<blockquote>"Opus 4.7 is a notable improvement on Opus 4.6 in advanced software engineering, with particular gains on the most difficult tasks."<cite>— Anthropic, Model Release Statement, April 17, 2026</cite></blockquote>
<h3>What Opus 4.7 Actually Does</h3>
<p>The capabilities are real and substantial. Claude Opus 4.7 scores 64.3% on SWE-bench Pro — a benchmark that tests AI models on real-world software engineering tasks drawn from open-source repositories — and 87.6% on SWE-bench Verified. It scores 69.4% on Terminal-Bench 2.0. To contextualise those numbers: a year ago, no model could reliably complete more than a third of SWE-bench tasks. The gap between what AI can now do autonomously in software engineering and what it could do eighteen months ago is enormous.</p>
<p>The model also introduces new capabilities that matter for practical deployment. A new /ultrareview command in Claude Code goes beyond standard code review — instead of checking syntax and basic errors, it simulates a senior human reviewer, flagging subtle design flaws, architectural problems, and logic gaps that would typically require experienced engineering judgment. "Auto mode," which allows Claude to make autonomous decisions without constant permission prompts, has been extended to Max plan users. A new effort control system — including an "xhigh" level sitting between high and max — gives developers fine-grained control over how much compute the model allocates to individual tasks.</p>

<li><span>Terminal-Bench 2.0</span><strong>69.4%</strong></li>
<li><span>Context window</span><strong>1 million tokens</strong></li>
<li><span>Anthropic valuation (April 2026)</span><strong>$380B (reported $800B VC offers)</strong></li>
<li><span>Annual run-rate revenue</span><strong>$30 billion</strong></li>
<li><span>Available on</span><strong>Claude.ai, Bedrock, Vertex AI, Azure Foundry</strong></li>

<h3>The Model They Won't Release</h3>
<p>Claude Mythos is more capable than Opus 4.7 across every measured dimension. Anthropic has said Mythos is restricted to a select group of technology and cybersecurity companies under a programme called Project Glasswing. The company has said its goal is to "learn how it could eventually deploy Mythos-class models at scale" — implying that the restriction is temporary, a cautious step before broader release, rather than a permanent decision.</p>
<p>What Anthropic is conceding by keeping Mythos restricted is that it believes this model poses risks it cannot yet adequately mitigate at scale. The cybersecurity dimension is the most explicit concern — Mythos is being used to identify vulnerabilities in enterprise software, a task for which its capabilities make it extraordinarily effective. But those same capabilities, if accessible to malicious actors, could be used to find and exploit those same vulnerabilities for harm.</p>
<div class="pull-quote">"Anthropic does not plan to make Claude Mythos Preview generally available — the company's goal is to learn how it could eventually deploy Mythos-class models at scale."</div>
<h3>The $800 Billion Question</h3>
<p>Anthropic's annual run-rate revenue has reached $30 billion in April 2026, driven primarily by enterprise adoption and the extraordinary commercial success of Claude Code — the company's autonomous software development tool. Venture capital firms are reportedly extending investment offers at valuations approaching $800 billion, more than double the $380 billion Series G valuation Anthropic carried in February.</p>
<p>That financial trajectory creates its own pressure. A company valued at $800 billion has obligations to investors that a mission-driven safety lab does not. Whether Anthropic can maintain the discipline to withhold Mythos from the market — or its successor, or the model after that — while its commercial momentum accelerates is the deepest question in AI development today. The company has always argued that safety-focused labs must remain at the frontier, because ceding the frontier to less cautious actors would be more dangerous than advancing carefully. Mythos tests that argument in the most direct way imaginable.</p>
<h3>Claude Design and the Broader Product Expansion</h3>
<p>Alongside Opus 4.7, Anthropic launched Claude Design — an experimental product from Anthropic Labs that allows users to generate designs, prototypes, slide decks, and one-pagers through natural language. The product, which competes directly with Figma and Adobe in the design workflow space, is built on Opus 4.7 and targets founders, product managers, and marketers without a dedicated design team.</p>
<p>Anthropic also confirmed this week that Claude products will remain permanently ad-free, publishing a formal statement explaining that advertising incentives are structurally incompatible with an AI assistant designed to give honest, unbiased answers. In a media environment where nearly every digital product eventually discovers advertising, the commitment is notable. Whether it holds as the company's scale increases is another question entirely.</p>`

function buildLiveSection() {

  }
  var updates = [
    {time:timeAgo(5),tag:'war',tagL:'Conflict',text:'<strong>Iran ceasefire:</strong> VP Vance has departed Andrews Air Force Base for Islamabad, Pakistan. Three US sources confirm delegation includes Witkoff and Kushner. Iran has not confirmed participation in second round of talks.'},

// RENDER ENGINE
// ═══════════════════════════════════════════════
function render() {
  var root = document.getElementById('app-root');
  var html = '';
  if (state.page === 'home') {
    html = buildHome();
  } else if (state.page === 'article') {
    html = buildArticlePage(state.articleId);
  } else if (state.page === 'category') {
    html = buildCategoryPage(state.category);
  }
  root.innerHTML = html;
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
function toggleSearch() {
  state.searchOpen = !state.searchOpen;
  var bar = document.getElementById('searchBar');
  if (bar) {
    bar.classList.toggle('open', state.searchOpen);
    if (state.searchOpen) { var inp = document.getElementById('searchInput'); if(inp) inp.focus(); }
  } else { render(); }
}

function doSearch() {
  var inp = document.getElementById('searchInput');
  if (!inp || !inp.value.trim()) return;
  var q = inp.value.toLowerCase().trim();
  // Simple keyword match
  var results = ARTICLES.filter(function(a){
    return a.headline.toLowerCase().includes(q) ||
           a.deck.toLowerCase().includes(q) ||
           a.cat.toLowerCase().includes(q) ||
           a.author.toLowerCase().includes(q);
  });
  if (results.length === 1) {
    navigate('article', results[0].id);
  } else {
    // Show all matching in a category-style page
    state.page = 'category';
    state.category = 'Search: "' + inp.value + '"';
    state.activeNav = 'All';
    window.scrollTo(0,0);
    // Temporarily override getByCategory for search
    var root = document.getElementById('app-root');
    var colorMap = {red:'linear-gradient(135deg,#180808,#2a1010)',gold:'linear-gradient(135deg,#181200,#2a2000)',teal:'linear-gradient(135deg,#041014,#081c28)',green:'linear-gradient(135deg,#041008,#081e10)'};
    root.innerHTML = '<div>' + buildTicker() + buildMasthead() + buildSearch() +
      '<div class="cat-page"><div class="cat-header">' +
        '<div class="cat-name">Search Results</div>' +
        '<div class="cat-desc">' + results.length + ' result' + (results.length!==1?'s':'') + ' for "' + inp.value + '"</div>' +
      '</div>' +
      (results.length===0 ? '<div style="text-align:center;padding:60px;color:var(--mist);font-family:\'Space Mono\',monospace;font-size:11px">No results found.</div>' :
        '<div class="cat-grid">' + results.map(function(a){
          return '<div class="card" onclick="navigate(\'article\',\'' + a.id + '\')" title="Read: ' + a.headline + '">' +
            '<div class="card-img" style="background:' + (colorMap[a.color]||colorMap.teal) + '">' +
              '<span style="font-size:44px;opacity:.4">' + a.heroIcon + '</span></div>' +
            '<div class="kicker">' + a.cat + '</div>' +
            '<div class="hl3">' + a.headline + '</div>' +
            '<div class="deck3">' + a.deck.substring(0,130) + '…</div>' +
            '<div class="byline" style="margin-top:10px"><strong>' + a.author + '</strong> · ' + a.time + '</div>' +
          '</div>';
        }).join('') + '</div>') +
      '<a class="back-btn" onclick="navigate(\'home\')">← Back to WorldPulse</a></div>' +
      buildFooter() + '</div>';
  }
}

function handleSearch(e) {
  if (e.key === 'Enter') doSearch();
  if (e.key === 'Escape') { state.searchOpen = false; render(); }
}

// ── INIT ──
render();
